name: fluxchat_flutter_example
description: Example Flutter app demonstrating all FluxChat widget modes.
publish_to: none
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  # Pulled directly from the monorepo — switch to a pub.dev version once published.
  fluxchat_sdk:
    git:
      url: https://github.com/benflux-corp/fluxchat-sdk
      path: sdk/dart
      ref: main
  # Dio is a transitive dependency of fluxchat_sdk — listed here explicitly
  # only if the example app needs to configure Dio directly.
  dio: ^5.7.0

dev_dependencies:
  flutter_lints: ^4.0.0
