<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FluxChat Widget — Demo</title>
    <style>
      body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 64px; color: #11181c; }
      h1 { font-weight: 800; }
      code { background: #f1f3f5; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>FluxChat Widget</h1>
    <p>Replace <code>YOUR_API_KEY</code> below, then open this file in a browser.</p>

    <!-- Local build: ../dist/widget.global.js — or use the CDN: -->
    <!-- <script src="https://unpkg.com/@fluxchat_sdk/sdk/dist/widget.global.js"></script> -->
    <script src="../dist/widget.global.js"></script>
    <script>
      FluxChatWidget.init({
        apiKey: 'YOUR_API_KEY',
        baseUrl: 'https://dev-api.fluxchat-corp.com/api/v2',
        clientName: 'Acme Bank',
        assistantName: 'Léa',
        primaryColor: '#4f46e5',
        greeting: 'Bonjour, une question sur votre compte ?',
        openOnLoad: true,
      });
    </script>
  </body>
</html>
